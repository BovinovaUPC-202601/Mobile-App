name: Android Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Read app version
        id: version
        run: |
          VERSION_NAME=$(sed -nE 's/.*versionName[[:space:]]*=[[:space:]]*"([^"]+)".*/\1/p' app/build.gradle.kts | head -n 1)

          if [ -z "$VERSION_NAME" ]; then
            echo "Could not read versionName from app/build.gradle.kts"
            exit 1
          fi

          echo "version=v$VERSION_NAME" >> "$GITHUB_OUTPUT"

      - name: Stop if release already exists
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${{ steps.version.outputs.version }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.version.outputs.version }} already exists"
            exit 1
          fi

      - name: Build APK
        run: ./gradlew :app:assembleDebug

      - name: Rename APK
        run: cp app/build/outputs/apk/debug/app-debug.apk vacapp-${{ steps.version.outputs.version }}.apk

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ steps.version.outputs.version }}" \
            "vacapp-${{ steps.version.outputs.version }}.apk" \
            --target main \
            --title "${{ steps.version.outputs.version }}" \
            --generate-notes
